<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Logado</title>
</h:head>
<h:body>
    <h2>Token Recebido</h2>
    <h:form>
        <h:commandButton value="Logout" action="#{logadoBean.logout}" />
    </h:form>
    <br/>
    <h:panelGrid columns="1">
        <h:outputText value="Access Token (Raw):" />
        <h:inputTextarea value="#{logadoBean.accessToken}" cols="100" rows="10" readonly="true" />

        <h:outputText value="ID Token (Raw):" />
        <h:inputTextarea value="#{logadoBean.idToken}" cols="100" rows="5" readonly="true" />

        <h:outputText value="Token Decodificado:" />
        <h:inputTextarea value="#{logadoBean.decodedToken}" cols="100" rows="15" readonly="true" />
    </h:panelGrid>
</h:body>
</html>
