<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Logado</title>
</h:head>
<h:body>
    <h2>Token Recebido</h2>
    <h:panelGrid columns="1">
        <h:outputText value="Code Access:" />
        <h:inputTextarea value="#{logadoBean.code}" cols="100" rows="10" readonly="true" />

        <h:outputText value="Access Token:" />
        <h:inputTextarea value="#{logadoBean.accessToken}" cols="100" rows="10" readonly="true" />

        <h:outputText value="Token Decodificado:" />
        <h:inputTextarea value="#{logadoBean.decodedToken}" cols="100" rows="15" readonly="true" />
    </h:panelGrid>
</h:body>
</html>
